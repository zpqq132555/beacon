name: 💬 Question
description: Ask about installing, configuring, or using Beacon.
title: 'Question: '
labels: ['question']
body:
  - type: textarea
    attributes:
      label: ❓ Question
      description: What are you trying to understand or accomplish?
      placeholder: 'I am trying to use Beacon to ...'
    validations:
      required: true

  - type: textarea
    attributes:
      label: 🔍 What you tried
      description: Include commands, configuration, docs you read, or workflow steps you followed.
      placeholder: |
        - Ran `beacon init ...`
        - Read `README.md` section ...
    validations:
      required: false

  - type: textarea
    attributes:
      label: 🖥️ Environment
      description: Add details if the question depends on your setup.
      value: |
        - OS:
        - Shell:
        - Node:
        - Install scope: project / global
        - Skill language: en / zh
        - Target AI platform(s):
      render: markdown
    validations:
      required: false

  - type: textarea
    attributes:
      label: 🧩 Additional context
      description: Links, screenshots, logs, or related issues.
    validations:
      required: false
